name: wpstack

services:

  db:
    image: mysql:8.4
    container_name: wpstack-mysql
    restart: always
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdbpassword11"]
      # Note: password matches MYSQL_ROOT_PASSWORD in .env
      # In production use Docker Secrets instead of embedding credentials here
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  wordpress:
    image: wordpress
    container_name: wpstack-wordpress
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${WP_PORT}:80"
    volumes:
      - wp-data:/var/www/html
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy

networks:
  frontend:
    name: wpstack-frontend
    driver: bridge
  backend:
    name: wpstack-backend
    driver: bridge

volumes:
  db-data:
    name: wpstack-db-data
    driver: local
    labels:
      project: wpstack
      component: database
  wp-data:
    name: wpstack-wp-data
    driver: local
    labels:
      project: wpstack
      component: wordpress
